name: Build, Push and Update Helm (GitOps)

on:
  push:
    tags: ['v*']  # workflow срабатывает на теги вида v1.2.3

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/frontend
      INFRA_REPO: railgorail/infra

    steps:
      # 1️⃣ Checkout frontend repo
      - name: Checkout frontend repo
        uses: actions/checkout@v4

      # 2️⃣ Log in to GHCR
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3️⃣ Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4️⃣ Set image tags
      - name: Set Docker tags
        run: |
          echo "SEMVER_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo "SHA_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      # 5️⃣ Build & Push Docker Image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.SEMVER_TAG }}
            ${{ env.IMAGE_NAME }}:${{ env.SHA_TAG }}
            ${{ env.IMAGE_NAME }}:latest

      # 6️⃣ Checkout infra repo (GitOps)
      - name: Checkout infra repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          token: ${{ secrets.PAT_TOKEN }}
          path: infra

      # 7️⃣ Update Helm values.yaml with SemVer tag
      - name: Update image tag in values.yaml
        run: |
          cd infra/charts/frontend
          sed -i "s/tag: .*/tag: ${{ env.SEMVER_TAG }}/" values.yaml

      # 8️⃣ Commit & push changes to GitOps repo
      - name: Commit and push changes
        run: |
          cd infra
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update frontend image to $SEMVER_TAG" || echo "No changes to commit"
          git push